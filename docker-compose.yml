  
# =============================================================
# RetailCo Data Pipeline — Docker Compose
# Services:
#   1. lake_db          → PostgreSQL for raw ERP data (the Data Lake)
#   2. warehouse_db     → PostgreSQL for clean warehouse + marts
#   3. airflow_meta_db  → PostgreSQL for Airflow's own internal state
#   4. airflow-init     → One-time setup job (creates admin user)
#   5. airflow-webserver→ Airflow UI (http://localhost:8080)
#   6. airflow-scheduler→ Runs your DAGs on schedule
# =============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_META_POSTGRES_USER}:${AIRFLOW_META_POSTGRES_PASSWORD}@airflow_meta_db:5432/${AIRFLOW_META_POSTGRES_DB}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    # Make env vars available inside DAG tasks
    ERP_API_KEY: ${ERP_API_KEY}
    ERP_BASE_URL: ${ERP_BASE_URL}
    LAKE_POSTGRES_HOST: ${LAKE_POSTGRES_HOST}
    LAKE_POSTGRES_PORT: 5432          # internal Docker port (always 5432 inside network)
    LAKE_POSTGRES_USER: ${LAKE_POSTGRES_USER}
    LAKE_POSTGRES_PASSWORD: ${LAKE_POSTGRES_PASSWORD}
    LAKE_POSTGRES_DB: ${LAKE_POSTGRES_DB}
    WAREHOUSE_POSTGRES_HOST: ${WAREHOUSE_POSTGRES_HOST}
    WAREHOUSE_POSTGRES_PORT: 5432     # internal Docker port
    WAREHOUSE_POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER}
    WAREHOUSE_POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD}
    WAREHOUSE_POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB}
  volumes:
    # DAGs folder — Airflow reads from here
    - ./airflow/dags:/opt/airflow/dags
    # Logs
    - ./airflow/logs:/opt/airflow/logs
    # Mount extractor, dlt, and dbt so Airflow tasks can call them
    - ./extractor:/opt/airflow/extractor
    - ./dlt_pipeline:/opt/airflow/dlt_pipeline
    - ./dbt_retailco:/opt/airflow/dbt_retailco
    # Shared pip requirements
    - ./airflow/requirements.txt:/opt/airflow/requirements.txt
  depends_on:
    airflow_meta_db:
      condition: service_healthy
  networks:
    - retailco_net

services:

  # ─────────────────────────────────────────
  # 1. LAKE DATABASE
  # ─────────────────────────────────────────
  lake_db:
    image: postgres:15
    container_name: retailco_lake_db
    env_file: .env
    environment:
      POSTGRES_USER: ${LAKE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${LAKE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${LAKE_POSTGRES_DB}
    ports:
      - "${LAKE_POSTGRES_PORT}:5432"   # exposed as 5433 on your laptop
    volumes:
      - lake_db_data:/var/lib/postgresql/data
      - ./sql/lake_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAKE_POSTGRES_USER} -d ${LAKE_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailco_net

  # ─────────────────────────────────────────
  # 2. WAREHOUSE DATABASE
  # ─────────────────────────────────────────
  warehouse_db:
    image: postgres:15
    container_name: retailco_warehouse_db
    env_file: .env
    environment:
      POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB}
    ports:
      - "${WAREHOUSE_POSTGRES_PORT}:5432"   # exposed as 5434 on your laptop
    volumes:
      - warehouse_db_data:/var/lib/postgresql/data
      - ./sql/warehouse_init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WAREHOUSE_POSTGRES_USER} -d ${WAREHOUSE_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailco_net

  # ─────────────────────────────────────────
  # 3. AIRFLOW METADATA DATABASE
  # ─────────────────────────────────────────
  airflow_meta_db:
    image: postgres:15
    container_name: retailco_airflow_meta_db
    env_file: .env
    environment:
      POSTGRES_USER: ${AIRFLOW_META_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_META_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_META_POSTGRES_DB}
    volumes:
      - airflow_meta_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_META_POSTGRES_USER} -d ${AIRFLOW_META_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - retailco_net

  # ─────────────────────────────────────────
  # 4. AIRFLOW INIT (runs once, then exits)
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: retailco_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install -r /opt/airflow/requirements.txt
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@retailco.com \
          --password admin
        echo "Airflow initialised successfully"
    restart: "no"

  # ─────────────────────────────────────────
  # 5. AIRFLOW WEBSERVER  → http://localhost:8080
  # ─────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: retailco_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─────────────────────────────────────────
  # 6. AIRFLOW SCHEDULER
  # ─────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: retailco_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

# =============================================================
# NAMED VOLUMES  (data persists even when containers restart)
# =============================================================
volumes:
  lake_db_data:
  warehouse_db_data:
  airflow_meta_data:

# =============================================================
# NETWORK  (all containers talk to each other on this network)
# =============================================================
networks:
  retailco_net:
    driver: bridge