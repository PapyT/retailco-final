version: 2

models:
  - name: stg_customers
    description: "Staged customer records with types cast and columns renamed"
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_products
    description: "Staged product records with prices cast to numeric"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_stores
    columns:
      - name: store_id
        tests:
          - not_null
          - unique

  - name: stg_employees
    columns:
      - name: employee_id
        tests:
          - not_null
          - unique

  - name: stg_payment_methods
    columns:
      - name: payment_method_id
        tests:
          - not_null
          - unique

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

  - name: stg_order_items
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique

  - name: stg_payments
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: payment_classification
        tests:
          - accepted_values:
              values: ['payment', 'refund', 'flagged_zero', 'flagged_unexplained_negative']

  - name: stg_inventory_movements
    columns:
      - name: movement_id
        tests:
          - not_null
          - unique
      - name: direction
        tests:
          - accepted_values:
              values: ['inbound', 'outbound']
