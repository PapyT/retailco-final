version: 2

models:
  # ── DIMENSIONS ──────────────────────────────
  - name: dim_date
    description: "Date dimension covering 2023-2026 with Nigerian public holidays"
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: full_date
        tests:
          - not_null

  - name: dim_customer
    description: "SCD2 customer dimension — one row per customer version"
    columns:
      - name: customer_key
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null

  - name: dim_product
    description: "SCD2 product dimension — one row per product version"
    columns:
      - name: product_key
        tests:
          - not_null
          - unique
      - name: product_id
        tests:
          - not_null

  - name: dim_store
    columns:
      - name: store_key
        tests:
          - not_null
          - unique
      - name: store_id
        tests:
          - not_null

  - name: dim_employee
    columns:
      - name: employee_key
        tests:
          - not_null
          - unique
      - name: store_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_key

  - name: dim_payment_method
    columns:
      - name: payment_method_key
        tests:
          - not_null
          - unique

  # ── FACTS ──────────────────────────────────
  - name: fct_sales
    description: "Transactional fact — one row per order line item"
    columns:
      - name: sales_key
        tests:
          - not_null
          - unique
      - name: date_key
        tests:
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: store_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_key
      - name: net_revenue
        tests:
          - not_null

  - name: fct_payments
    description: "Transactional fact — one row per valid payment event"
    columns:
      - name: payment_key
        tests:
          - not_null
          - unique
      - name: date_key
        tests:
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: payment_method_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_payment_method')
              field: payment_method_key

  - name: fct_inventory_daily
    description: "Periodic snapshot — one row per product × store × day"
    columns:
      - name: inventory_key
        tests:
          - not_null
          - unique
      - name: date_key
        tests:
          - not_null
      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key
      - name: store_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_key

  - name: fct_order_lifecycle
    description: "Accumulating snapshot — one row per order with milestone timestamps"
    columns:
      - name: lifecycle_key
        tests:
          - not_null
          - unique
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: current_status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'paid', 'shipped', 'delivered', 'cancelled']

  - name: flagged_payments
    description: "Data quality table — anomalous payments isolated here"
    columns:
      - name: flagged_key
        tests:
          - not_null
          - unique
      - name: flag_reason
        tests:
          - not_null
